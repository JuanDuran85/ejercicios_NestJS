scalar Date

interface Drink {
  name: String!
}

type Tea implements Drink {
  name: String!
}

"""
Coffees Model
"""
type Coffee implements Drink {
  """
  A unique identifier for the resource.
  """
  id: ID!
  name: String!
  brand: String!
  flavors: [Flavor!]
  createdAt: Date
}
 
type Flavor {
  id: ID!
  name: String!
}



"""
Create coffee input object type.
"""
input CreateCoffeeInput {
  """
  A new coffee name.
  """
  name: String!
  brand: String!
  flavors: [String!]!
}

"""
Update a coffee input object type by id.
"""
input UpdateCoffeeInput  {
  name: String
  brand: String
  flavors: [String!]
}

union DrinksResult = Coffee | Tea

"""
Get all coffees query
"""
type Query {
  coffees: [Coffee!]!
  coffee(id: ID!): Coffee!
  drinks: [DrinksResult!]!
}

type Mutation {
  createCoffee(createCoffeeInput: CreateCoffeeInput!): Coffee!
  updateCoffee(id: ID!, updateCoffeeInput: UpdateCoffeeInput!): Coffee!
  removeCoffee(id: ID!): Coffee!
}
